<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Tech - Login</title>


    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <div class="left-side">

            <header>
                <h1>SIRA</h1>

                <nav>
                    <a href="#">HOME</a>
                    <a href="#">ABOUT US</a>
                    <a href="#">CONTACT</a>
                    <a href="#" class="active">LOG IN</a>
                </nav>
            </header>

            <div class="login-box">

                <h2>Log in</h2>

                <form>

                    <input
                        type="text"
                        placeholder="NOME"
                    >

                    <input
                        type="password"
                        placeholder="SENHA"
                    >

                    <div class="options">

                        <label>
                            <input type="checkbox">
                            ME LEMBRAR
                        </label>

                        <a href="#">
                            ESQUECEU A SENHA?
                        </a>

                    </div>

                    <button type="submit">
                        Log in
                    </button>

                    <p>
                        ou
                        <a href="/cadastro/">
                            Sign up
                        </a>
                    </p>

                </form>

            </div>

        </div>

        <div class="right-side">

            <img
                src="img/estudante.png"
                alt="Estudante"
            >

        </div>

    </div>

</body>
</html>
